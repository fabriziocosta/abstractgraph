name: CI

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install external dependencies
        run: python -m pip install --upgrade pip networkx numpy scikit-learn matplotlib
      - name: Install package
        run: python -m pip install -e . --no-deps
      - name: Compile package
        run: python -m py_compile src/abstractgraph/*.py src/abstractgraph/to_graph/*.py
      - name: Run smoke test
        run: python scripts/smoke_test.py
